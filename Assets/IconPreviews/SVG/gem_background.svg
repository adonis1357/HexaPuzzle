<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Subtle cushion radial gradient (center bright, edges slightly darker) -->
    <radialGradient id="bgCushion" cx="0.45" cy="0.40" r="0.58">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FAFAFA"/>
      <stop offset="80%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#E4E4E4"/>
    </radialGradient>
    <!-- Soft directional light overlay (top-left bright) -->
    <linearGradient id="bgLight" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <!-- Base filled hex with cushion gradient -->
  <polygon points="95,10 126,64 95,118 33,118 2,64 33,10"
    fill="url(#bgCushion)" stroke-linejoin="round"/>
  <!-- Directional light overlay -->
  <polygon points="95,10 126,64 95,118 33,118 2,64 33,10"
    fill="url(#bgLight)" stroke-linejoin="round"/>
</svg>
