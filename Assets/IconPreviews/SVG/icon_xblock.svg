<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe880"/>
      <stop offset="40%" stop-color="#ffcc20"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffdd40"/>
      <stop offset="100%" stop-color="#b88800"/>
    </linearGradient>
  </defs>

  <!-- Crown body -->
  <path d="M18,90 L18,48 L40,68 L64,28 L88,68 L110,48 L110,90 Z"
        fill="url(#crown)" stroke="#aa7700" stroke-width="2" stroke-linejoin="round"/>

  <!-- Crown highlight -->
  <path d="M22,50 L40,68 L64,32" fill="white" opacity="0.15"/>

  <!-- Crown base band -->
  <rect x="18" y="82" width="92" height="14" rx="3" fill="url(#band)" stroke="#aa7700" stroke-width="1.5"/>
  <!-- Band highlight -->
  <rect x="22" y="84" width="86" height="4" rx="2" fill="white" opacity="0.2"/>

  <!-- Tip jewels -->
  <circle cx="18" cy="46" r="5" fill="#fff0aa" stroke="#aa7700" stroke-width="1.2"/>
  <circle cx="64" cy="26" r="6" fill="#fff0aa" stroke="#aa7700" stroke-width="1.2"/>
  <circle cx="110" cy="46" r="5" fill="#fff0aa" stroke="#aa7700" stroke-width="1.2"/>

  <!-- Band center jewel -->
  <circle cx="64" cy="89" r="5" fill="#fff8cc" stroke="#aa7700" stroke-width="1.2"/>
  <circle cx="62" cy="87" r="1.5" fill="white" opacity="0.5"/>

  <!-- Band side jewels -->
  <circle cx="40" cy="89" r="3.5" fill="#fff0aa" stroke="#aa7700" stroke-width="1"/>
  <circle cx="88" cy="89" r="3.5" fill="#fff0aa" stroke="#aa7700" stroke-width="1"/>
</svg>