<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 진한 네이비 + 미묘한 보라 그라디언트 -->
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1e1840"/>
      <stop offset="100%" stop-color="#140e2a"/>
    </linearGradient>
    <!-- 빛나는 가장자리 -->
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(100,130,220,0.45)"/>
      <stop offset="50%" stop-color="rgba(140,100,220,0.25)"/>
      <stop offset="100%" stop-color="rgba(100,130,220,0.45)"/>
    </linearGradient>
  </defs>
  <!-- 패널 배경 -->
  <rect x="6" y="6" width="500" height="500" rx="56" ry="56" fill="url(#panelGrad)"/>
  <!-- 빛나는 테두리 -->
  <rect x="6" y="6" width="500" height="500" rx="56" ry="56" fill="none" stroke="url(#borderGlow)" stroke-width="4"/>
  <!-- 내부 미묘한 광택 -->
  <rect x="20" y="12" width="472" height="240" rx="44" ry="44" fill="rgba(255,255,255,0.03)"/>
</svg>
