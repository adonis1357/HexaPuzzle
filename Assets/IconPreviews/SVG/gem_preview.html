<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hex Gem Design Preview</title>
<style>
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    padding: 30px;
    margin: 0;
  }
  h1 { color: #c0d8ff; font-size: 22px; margin-bottom: 4px; }
  h2 { color: #778899; font-size: 14px; margin-top: 6px; }
  h3 { color: #88aacc; font-size: 16px; }

  .grid {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .card {
    background: #2a2a3a;
    border: 1px solid #3a3a4a;
    border-radius: 14px;
    padding: 16px;
    width: 150px;
  }

  .sizes {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
  }

  .name { font-size: 15px; font-weight: bold; }
  .info { font-size: 11px; color: #888; margin-top: 3px; font-family: monospace; }

  .section {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #333;
  }

  /* Hex cells */
  .hex-row {
    display: flex;
    justify-content: center;
    gap: 4px;
  }
  .hex-row.offset { margin-top: -16px; margin-left: 34px; }
  .hex-row.no-offset { margin-top: -16px; }

  .hex-cell {
    width: 64px;
    height: 64px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background: #2a2a3a;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hex-cell img {
    width: 56px;
    height: 56px;
  }

  /* Dark board background */
  .board-wrap {
    background: #10101a;
    border-radius: 16px;
    padding: 20px;
    display: inline-block;
    margin-top: 16px;
  }

  /* Large preview */
  .large-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
  }
  .large-row img { width: 96px; height: 96px; }
</style>
</head>
<body>
  <h1>Hex Gem Designs - 5 Colors</h1>
  <h2>Faceted hexagonal gems with unique color palettes</h2>

  <!-- Individual Cards -->
  <div class="grid">
    <div class="card">
      <div class="sizes">
        <img src="gem_red.svg" width="80" height="80">
        <div>
          <img src="gem_red.svg" width="44" height="44">
          <div style="margin-top:4px"><img src="gem_red.svg" width="28" height="28"></div>
        </div>
      </div>
      <div class="name" style="color:#FF5050">Red</div>
      <div class="info">#ED2E2E</div>
    </div>

    <div class="card">
      <div class="sizes">
        <img src="gem_blue.svg" width="80" height="80">
        <div>
          <img src="gem_blue.svg" width="44" height="44">
          <div style="margin-top:4px"><img src="gem_blue.svg" width="28" height="28"></div>
        </div>
      </div>
      <div class="name" style="color:#5090FF">Blue</div>
      <div class="info">#2673F2</div>
    </div>

    <div class="card">
      <div class="sizes">
        <img src="gem_green.svg" width="80" height="80">
        <div>
          <img src="gem_green.svg" width="44" height="44">
          <div style="margin-top:4px"><img src="gem_green.svg" width="28" height="28"></div>
        </div>
      </div>
      <div class="name" style="color:#40D058">Green</div>
      <div class="info">#2EC747</div>
    </div>

    <div class="card">
      <div class="sizes">
        <img src="gem_yellow.svg" width="80" height="80">
        <div>
          <img src="gem_yellow.svg" width="44" height="44">
          <div style="margin-top:4px"><img src="gem_yellow.svg" width="28" height="28"></div>
        </div>
      </div>
      <div class="name" style="color:#FFD830">Yellow</div>
      <div class="info">#FFD114</div>
    </div>

    <div class="card">
      <div class="sizes">
        <img src="gem_purple.svg" width="80" height="80">
        <div>
          <img src="gem_purple.svg" width="44" height="44">
          <div style="margin-top:4px"><img src="gem_purple.svg" width="28" height="28"></div>
        </div>
      </div>
      <div class="name" style="color:#B060F0">Purple</div>
      <div class="info">#9E33E0</div>
    </div>
  </div>

  <!-- Game Board Simulation -->
  <div class="section">
    <h3>Game Board Simulation</h3>
    <div class="board-wrap">
      <!-- Row 1 -->
      <div class="hex-row">
        <div class="hex-cell"><img src="gem_blue.svg"></div>
        <div class="hex-cell"><img src="gem_red.svg"></div>
        <div class="hex-cell"><img src="gem_green.svg"></div>
        <div class="hex-cell"><img src="gem_yellow.svg"></div>
        <div class="hex-cell"><img src="gem_purple.svg"></div>
      </div>
      <!-- Row 2 (offset) -->
      <div class="hex-row offset">
        <div class="hex-cell"><img src="gem_yellow.svg"></div>
        <div class="hex-cell"><img src="gem_purple.svg"></div>
        <div class="hex-cell"><img src="gem_red.svg"></div>
        <div class="hex-cell"><img src="gem_blue.svg"></div>
        <div class="hex-cell"><img src="gem_green.svg"></div>
      </div>
      <!-- Row 3 -->
      <div class="hex-row no-offset">
        <div class="hex-cell"><img src="gem_green.svg"></div>
        <div class="hex-cell"><img src="gem_yellow.svg"></div>
        <div class="hex-cell"><img src="gem_blue.svg"></div>
        <div class="hex-cell"><img src="gem_purple.svg"></div>
        <div class="hex-cell"><img src="gem_red.svg"></div>
      </div>
      <!-- Row 4 (offset) -->
      <div class="hex-row offset">
        <div class="hex-cell"><img src="gem_red.svg"></div>
        <div class="hex-cell"><img src="gem_green.svg"></div>
        <div class="hex-cell"><img src="gem_purple.svg"></div>
        <div class="hex-cell"><img src="gem_yellow.svg"></div>
        <div class="hex-cell"><img src="gem_blue.svg"></div>
      </div>
      <!-- Row 5 -->
      <div class="hex-row no-offset">
        <div class="hex-cell"><img src="gem_purple.svg"></div>
        <div class="hex-cell"><img src="gem_blue.svg"></div>
        <div class="hex-cell"><img src="gem_red.svg"></div>
        <div class="hex-cell"><img src="gem_green.svg"></div>
        <div class="hex-cell"><img src="gem_yellow.svg"></div>
      </div>
    </div>
  </div>

  <!-- Large Preview -->
  <div class="section">
    <h3>Large Detail View</h3>
    <div class="large-row">
      <img src="gem_red.svg">
      <img src="gem_blue.svg">
      <img src="gem_green.svg">
      <img src="gem_yellow.svg">
      <img src="gem_purple.svg">
    </div>
  </div>

</body>
</html>
