<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 96" width="64" height="96">
  <defs>
    <linearGradient id="pShaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#788090"/>
      <stop offset="25%" stop-color="#b8c0c8"/>
      <stop offset="45%" stop-color="#dce4ec"/>
      <stop offset="55%" stop-color="#e8f0f4"/>
      <stop offset="75%" stop-color="#b8c0c8"/>
      <stop offset="100%" stop-color="#788090"/>
    </linearGradient>
    <linearGradient id="pHead" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8890a0"/>
      <stop offset="40%" stop-color="#b0b8c8"/>
      <stop offset="100%" stop-color="#dce4ec"/>
    </linearGradient>
    <linearGradient id="pFin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8890a0"/>
      <stop offset="100%" stop-color="#606878"/>
    </linearGradient>
  </defs>

  <!-- Drill head (pointed tip at top) -->
  <polygon points="32,2 18,30 46,30" fill="url(#pHead)" stroke="#606878" stroke-width="1" stroke-linejoin="round"/>
  <!-- Head groove lines converging to tip -->
  <line x1="25" y1="26" x2="32" y2="6" stroke="#7880a0" stroke-width="1.2" opacity="0.35"/>
  <line x1="39" y1="26" x2="32" y2="6" stroke="#7880a0" stroke-width="1.2" opacity="0.25"/>
  <!-- Head specular highlight -->
  <polygon points="32,4 28,26 32,28" fill="white" opacity="0.15"/>

  <!-- Shaft body -->
  <rect x="22" y="28" width="20" height="42" rx="2.5" fill="url(#pShaft)" stroke="#606878" stroke-width="1"/>

  <!-- Shaft groove lines (diagonal flutes) -->
  <g stroke="#7880a0" stroke-width="1.5" opacity="0.45">
    <line x1="22" y1="34" x2="42" y2="30"/>
    <line x1="22" y1="40" x2="42" y2="36"/>
    <line x1="22" y1="46" x2="42" y2="42"/>
    <line x1="22" y1="52" x2="42" y2="48"/>
    <line x1="22" y1="58" x2="42" y2="54"/>
    <line x1="22" y1="64" x2="42" y2="60"/>
  </g>
  <!-- Groove highlights -->
  <g stroke="white" stroke-width="0.6" opacity="0.18">
    <line x1="22" y1="33" x2="42" y2="29"/>
    <line x1="22" y1="39" x2="42" y2="35"/>
    <line x1="22" y1="45" x2="42" y2="41"/>
    <line x1="22" y1="51" x2="42" y2="47"/>
    <line x1="22" y1="57" x2="42" y2="53"/>
    <line x1="22" y1="63" x2="42" y2="59"/>
  </g>

  <!-- Center highlight line -->
  <line x1="32" y1="6" x2="32" y2="68" stroke="white" stroke-width="1.2" opacity="0.12"/>

  <!-- Tip bright point -->
  <circle cx="32" cy="3" r="1.5" fill="#f0f4f8" opacity="0.7"/>
</svg>
