<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8890a0"/>
      <stop offset="30%" stop-color="#c8d0d8"/>
      <stop offset="50%" stop-color="#e0e8f0"/>
      <stop offset="70%" stop-color="#c8d0d8"/>
      <stop offset="100%" stop-color="#8890a0"/>
    </linearGradient>
    <linearGradient id="headUp" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a0a8b8"/>
      <stop offset="100%" stop-color="#d8e0e8"/>
    </linearGradient>
    <linearGradient id="headDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a8b8"/>
      <stop offset="100%" stop-color="#d8e0e8"/>
    </linearGradient>
  </defs>

  <!-- Shaft -->
  <rect x="50" y="34" width="28" height="60" rx="3" fill="url(#shaft)" stroke="#6a7080" stroke-width="1.5"/>

  <!-- Drill grooves on shaft (diagonal flutes) -->
  <g stroke="#8890a0" stroke-width="2" opacity="0.5">
    <line x1="50" y1="44" x2="78" y2="38"/>
    <line x1="50" y1="52" x2="78" y2="46"/>
    <line x1="50" y1="60" x2="78" y2="54"/>
    <line x1="50" y1="68" x2="78" y2="62"/>
    <line x1="50" y1="76" x2="78" y2="70"/>
    <line x1="50" y1="84" x2="78" y2="78"/>
    <line x1="50" y1="92" x2="78" y2="86"/>
  </g>
  <!-- Groove highlights (offset bright lines) -->
  <g stroke="white" stroke-width="0.8" opacity="0.2">
    <line x1="50" y1="42" x2="78" y2="36"/>
    <line x1="50" y1="50" x2="78" y2="44"/>
    <line x1="50" y1="58" x2="78" y2="52"/>
    <line x1="50" y1="66" x2="78" y2="60"/>
    <line x1="50" y1="74" x2="78" y2="68"/>
    <line x1="50" y1="82" x2="78" y2="76"/>
    <line x1="50" y1="90" x2="78" y2="84"/>
  </g>

  <!-- Top drill head -->
  <polygon points="64,4 86,38 42,38" fill="url(#headUp)" stroke="#6a7080" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Top head groove lines -->
  <line x1="53" y1="34" x2="64" y2="10" stroke="#8890a0" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="34" x2="64" y2="10" stroke="#8890a0" stroke-width="1.5" opacity="0.3"/>

  <!-- Bottom drill head -->
  <polygon points="64,124 86,90 42,90" fill="url(#headDown)" stroke="#6a7080" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Bottom head groove lines -->
  <line x1="53" y1="94" x2="64" y2="118" stroke="#8890a0" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="94" x2="64" y2="118" stroke="#8890a0" stroke-width="1.5" opacity="0.3"/>

  <!-- Center highlight line -->
  <line x1="64" y1="10" x2="64" y2="118" stroke="white" stroke-width="1.5" opacity="0.15"/>
</svg>