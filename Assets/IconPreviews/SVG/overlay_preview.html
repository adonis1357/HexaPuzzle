<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chain & Thorn Overlay Preview</title>
<style>
  body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: white; text-align: center; padding: 30px; }
  h1 { color: #c0d8ff; font-size: 22px; }
  h2 { color: #778899; font-size: 14px; margin-top: 6px; }
  h3 { color: #88aacc; font-size: 16px; margin-top: 24px; }
  .row { display: flex; justify-content: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .card { background: #2a2a3a; border: 1px solid #3a3a4a; border-radius: 14px; padding: 16px; width: 140px; }
  .name { font-size: 14px; font-weight: bold; margin-top: 8px; }
  .desc { font-size: 11px; color: #888; margin-top: 3px; }
  .hex-cell {
    width: 100px; height: 100px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    position: relative;
    display: inline-block;
  }
  .hex-cell img.gem { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .hex-cell img.overlay { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

  .gem-row { display: flex; justify-content: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .label { color: #667; font-size: 11px; margin-top: 12px; }
</style>
</head>
<body>
  <h1>Chain & Thorn Overlays</h1>
  <h2>Enemy overlay effects on gem blocks</h2>

  <!-- Standalone overlays -->
  <div class="row">
    <div class="card">
      <img src="overlay_chain.svg" width="100" height="100">
      <div class="name" style="color:#A0A8B0">Chain (사슬)</div>
      <div class="desc">속박의 사슬 - X자 체인 링크</div>
    </div>
    <div class="card">
      <img src="overlay_thorn.svg" width="100" height="100">
      <div class="name" style="color:#E03040">Thorn (가시)</div>
      <div class="desc">가시 기생충 - 8방향 가시</div>
    </div>
    <div class="card">
      <div style="position:relative;width:100px;height:100px;margin:0 auto">
        <img src="overlay_thorn.svg" width="100" height="100" style="position:absolute;top:0;left:0">
        <img src="overlay_chain.svg" width="100" height="100" style="position:absolute;top:0;left:0">
      </div>
      <div class="name" style="color:#C06878">Both (동시)</div>
      <div class="desc">가시 + 사슬 동시 적용</div>
    </div>
  </div>

  <!-- On gem colors -->
  <h3>Chain on Gems (사슬 오버레이)</h3>
  <div class="gem-row">
    <div class="hex-cell">
      <img class="gem" src="gem_red.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_blue.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_green.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_yellow.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_purple.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
  </div>

  <h3>Thorn on Gems (가시 오버레이)</h3>
  <div class="gem-row">
    <div class="hex-cell">
      <img class="gem" src="gem_red.svg">
      <img class="overlay" src="overlay_thorn.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_blue.svg">
      <img class="overlay" src="overlay_thorn.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_green.svg">
      <img class="overlay" src="overlay_thorn.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_yellow.svg">
      <img class="overlay" src="overlay_thorn.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_purple.svg">
      <img class="overlay" src="overlay_thorn.svg">
    </div>
  </div>

  <h3>Both on Gems (사슬+가시 동시)</h3>
  <div class="gem-row">
    <div class="hex-cell">
      <img class="gem" src="gem_red.svg">
      <img class="overlay" src="overlay_thorn.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_blue.svg">
      <img class="overlay" src="overlay_thorn.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_green.svg">
      <img class="overlay" src="overlay_thorn.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_yellow.svg">
      <img class="overlay" src="overlay_thorn.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_purple.svg">
      <img class="overlay" src="overlay_thorn.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
  </div>

  <!-- On gray (chromophage) -->
  <h3>On Gray Gem (색상 도둑)</h3>
  <div class="gem-row">
    <div class="hex-cell">
      <img class="gem" src="gem_gray.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_gray.svg">
      <img class="overlay" src="overlay_chain.svg">
    </div>
    <div class="hex-cell">
      <img class="gem" src="gem_gray.svg">
      <img class="overlay" src="overlay_thorn.svg">
    </div>
  </div>
  <div class="label">기본 / 사슬 / 가시</div>
</body>
</html>
