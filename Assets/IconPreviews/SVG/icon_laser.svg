<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="star" cx="45%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#a0f8ff"/>
      <stop offset="50%" stop-color="#40dde8"/>
      <stop offset="100%" stop-color="#20a8b8"/>
    </radialGradient>
  </defs>

  <!-- 6-pointed star -->
  <polygon points="64,8 80,40 114,36 94,64 114,92 80,88 64,120 48,88 14,92 34,64 14,36 48,40"
           fill="url(#star)" stroke="#18889a" stroke-width="1.5"/>

  <!-- Top facet highlight -->
  <polygon points="64,8 80,40 48,40" fill="white" opacity="0.2"/>

  <!-- Center hexagon -->
  <polygon points="64,52 74,58 74,70 64,76 54,70 54,58"
           fill="#e0ffff" stroke="#30bbc8" stroke-width="1.5"/>

  <!-- Lines from hexagon vertices to star tips -->
  <g stroke="#e0ffff" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <!-- Hex top → Star top -->
    <line x1="64" y1="52" x2="64" y2="8"/>
    <!-- Hex top-right → Star upper-right -->
    <line x1="74" y1="58" x2="114" y2="36"/>
    <!-- Hex bottom-right → Star lower-right -->
    <line x1="74" y1="70" x2="114" y2="92"/>
    <!-- Hex bottom → Star bottom -->
    <line x1="64" y1="76" x2="64" y2="120"/>
    <!-- Hex bottom-left → Star lower-left -->
    <line x1="54" y1="70" x2="14" y2="92"/>
    <!-- Hex top-left → Star upper-left -->
    <line x1="54" y1="58" x2="14" y2="36"/>
  </g>

  <!-- Star tip dots -->
  <g fill="#e0ffff" opacity="0.6">
    <circle cx="64" cy="8" r="3"/>
    <circle cx="114" cy="36" r="2.5"/>
    <circle cx="114" cy="92" r="2.5"/>
    <circle cx="64" cy="120" r="3"/>
    <circle cx="14" cy="92" r="2.5"/>
    <circle cx="14" cy="36" r="2.5"/>
  </g>
</svg>