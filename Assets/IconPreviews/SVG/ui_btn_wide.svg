<svg xmlns="http://www.w3.org/2000/svg" width="512" height="160" viewBox="0 0 512 160">
  <defs>
    <!-- 세로 그라디언트 -->
    <linearGradient id="wideBtnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e4a8a"/>
      <stop offset="100%" stop-color="#1a2d5e"/>
    </linearGradient>
    <!-- 상단 하이라이트 -->
    <linearGradient id="wideHlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 둥근 사각형 배경 -->
  <rect x="4" y="4" width="504" height="152" rx="40" ry="40" fill="url(#wideBtnGrad)"/>
  <!-- 테두리 -->
  <rect x="4" y="4" width="504" height="152" rx="40" ry="40" fill="none" stroke="rgba(115,140,215,0.30)" stroke-width="3"/>
  <!-- 상단 하이라이트 -->
  <rect x="24" y="8" width="464" height="70" rx="30" ry="30" fill="url(#wideHlGrad)"/>
</svg>
