<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 방사형 그라디언트: 중심 밝음 → 가장자리 어둠 -->
    <radialGradient id="btnGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3a3555"/>
      <stop offset="100%" stop-color="#1a1828"/>
    </radialGradient>
    <!-- 상단 하이라이트 -->
    <radialGradient id="hlGrad" cx="50%" cy="20%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- 메인 원형 배경 -->
  <circle cx="256" cy="256" r="240" fill="url(#btnGrad)"/>
  <!-- 테두리 링 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(115,140,215,0.35)" stroke-width="4"/>
  <!-- 상단 하이라이트 아크 -->
  <ellipse cx="256" cy="180" rx="160" ry="80" fill="url(#hlGrad)"/>
</svg>
