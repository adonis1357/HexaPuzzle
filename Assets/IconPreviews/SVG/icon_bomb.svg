<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="body" cx="38%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="40%" stop-color="#2a2a2a"/>
      <stop offset="80%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="rimLight" cx="70%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#444444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Bomb body -->
  <circle cx="64" cy="72" r="42" fill="url(#body)" stroke="#333333" stroke-width="1.5"/>

  <!-- Rim light (bottom-right edge reflection) -->
  <circle cx="64" cy="72" r="42" fill="url(#rimLight)"/>

  <!-- Main highlight (top-left) -->
  <ellipse cx="50" cy="56" rx="14" ry="11" fill="white" opacity="0.25"/>
  <!-- Sharp specular -->
  <ellipse cx="48" cy="52" rx="6" ry="4" fill="white" opacity="0.4"/>

  <!-- Fuse neck -->
  <rect x="56" y="26" width="16" height="12" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>

  <!-- Fuse -->
  <path d="M68,30 Q76,18 72,10 Q78,4 84,10" fill="none" stroke="#444" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M68,30 Q76,18 72,10 Q78,4 84,10" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Spark -->
  <circle cx="84" cy="10" r="6" fill="#fff8cc" opacity="0.8"/>
  <circle cx="84" cy="10" r="3" fill="white"/>
  <g stroke="#ffe060" stroke-width="1.5" stroke-linecap="round">
    <line x1="84" y1="2" x2="84" y2="-1"/>
    <line x1="91" y1="10" x2="94" y2="10"/>
    <line x1="89" y1="5" x2="91" y2="3"/>
    <line x1="89" y1="15" x2="91" y2="17"/>
  </g>
</svg>