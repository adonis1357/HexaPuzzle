<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Crystal Hex — UI Button Icons Preview</title>
<style>
  body { margin:0; padding:40px; background:#0a0818; color:#ccc; font-family:sans-serif; }
  h1 { color:#8890cc; text-align:center; }
  .grid { display:flex; flex-wrap:wrap; gap:40px; justify-content:center; margin-top:30px; }
  .card { background:#16122a; border:1px solid rgba(100,120,200,0.25); border-radius:16px; padding:24px; text-align:center; width:180px; }
  .card h3 { color:#aab0e0; margin:0 0 12px; font-size:14px; }
  .card p { color:#667; font-size:11px; margin:8px 0 0; }
  .icon-wrap { width:80px; height:80px; margin:0 auto; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .icon-wrap.dark { background: rgba(36,31,56,0.9); }
  .icon-wrap svg { width:44px; height:44px; }
</style>
</head>
<body>
  <h1>UI Button Icons</h1>
  <div class="grid">

    <!-- 회전 아이콘 -->
    <div class="card">
      <h3>icon_rotate</h3>
      <div class="icon-wrap dark">
        <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 원형 화살표 (CW) -->
          <path d="M64 20 A44 44 0 1 1 28 84" stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
          <!-- 화살촉 -->
          <polygon points="22,68 36,88 14,88" fill="white"/>
        </svg>
      </div>
      <p>회전 방향 토글</p>
    </div>

    <!-- 망치 아이콘 -->
    <div class="card">
      <h3>icon_hammer</h3>
      <div class="icon-wrap dark">
        <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 망치 머리 -->
          <rect x="30" y="18" width="58" height="28" rx="5" fill="white" transform="rotate(-20 59 32)"/>
          <!-- 망치 자루 -->
          <rect x="55" y="42" width="12" height="58" rx="4" fill="white" transform="rotate(-20 61 71)"/>
        </svg>
      </div>
      <p>망치 아이템</p>
    </div>

    <!-- 사운드 ON -->
    <div class="card">
      <h3>icon_sound_on</h3>
      <div class="icon-wrap dark">
        <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 스피커 -->
          <path d="M20,48 L38,48 L62,26 L62,102 L38,80 L20,80 Z" fill="white"/>
          <!-- 음파 1 -->
          <path d="M76,42 A28,28 0 0 1 76,86" stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>
          <!-- 음파 2 -->
          <path d="M90,28 A42,42 0 0 1 90,100" stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.6"/>
        </svg>
      </div>
      <p>사운드 ON</p>
    </div>

    <!-- 사운드 OFF -->
    <div class="card">
      <h3>icon_sound_off</h3>
      <div class="icon-wrap dark">
        <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 스피커 -->
          <path d="M16,48 L34,48 L58,26 L58,102 L34,80 L16,80 Z" fill="white" opacity="0.5"/>
          <!-- X 표시 -->
          <line x1="76" y1="40" x2="112" y2="88" stroke="#ff5555" stroke-width="10" stroke-linecap="round"/>
          <line x1="112" y1="40" x2="76" y2="88" stroke="#ff5555" stroke-width="10" stroke-linecap="round"/>
        </svg>
      </div>
      <p>사운드 OFF</p>
    </div>

    <!-- 나가기 아이콘 -->
    <div class="card">
      <h3>icon_exit</h3>
      <div class="icon-wrap dark">
        <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 문 프레임 -->
          <path d="M22,16 L22,112 L72,112 L72,90" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M72,38 L72,16 L22,16" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- 나가기 화살표 -->
          <line x1="50" y1="64" x2="108" y2="64" stroke="white" stroke-width="9" stroke-linecap="round"/>
          <polyline points="86,44 108,64 86,84" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <p>로비로 나가기</p>
    </div>

  </div>
</body>
</html>
